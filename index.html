<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream Info</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  min-height: 100%;
  background: #0d0d0d;
  font-family: 'Menlo', 'Monaco', 'Consolas', monospace;
  color: #e2e8f0;
}
body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.card {
  width: 100%;
  max-width: 780px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  overflow: hidden;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  background: #1c2128;
  border-bottom: 1px solid #30363d;
}

.card-title {
  font-size: 0.8rem;
  color: #8b949e;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.copy-btn {
  font-family: inherit;
  font-size: 0.75rem;
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid #30363d;
  background: #21262d;
  color: #c9d1d9;
  cursor: pointer;
  transition: background 0.15s;
}
.copy-btn:hover { background: #2d333b; }
.copy-btn.copied { color: #3fb950; border-color: #3fb950; }

pre {
  padding: 24px;
  font-size: 0.88rem;
  line-height: 1.7;
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-all;
}

/* JSON syntax highlighting */
.json-key    { color: #79c0ff; }
.json-string { color: #a5d6ff; }
.json-null   { color: #ff7b72; }

/* Loader */
#loader {
  text-align: center;
  color: #8b949e;
  font-size: 0.9rem;
}
.dot { display: inline-block; animation: blink 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100% { opacity: 0; } 40% { opacity: 1; } }

/* Usage */
#usage {
  text-align: center;
  color: #8b949e;
  line-height: 2.2;
  padding: 40px;
}
#usage code {
  background: #21262d;
  border: 1px solid #30363d;
  border-radius: 4px;
  padding: 2px 8px;
  color: #c9d1d9;
}

/* Error */
#error-msg {
  color: #ff7b72;
  padding: 24px;
  font-size: 0.9rem;
}
</style>
</head>
<body>

<div class="card" id="card">
  <div class="card-header">
    <span class="card-title" id="card-title">Stream Info</span>
    <button class="copy-btn" id="copy-btn" style="display:none" onclick="copyJson()">Copy JSON</button>
  </div>
  <div id="content">
    <div id="loader">
      Fetching stream info<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
    </div>
  </div>
</div>

<script>
var p = new URLSearchParams(location.search);
var id = p.get('id'), s = p.get('s'), e = p.get('e');
var rawJson = null;

function showUsage() {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('card-title').textContent = 'Usage';
  document.getElementById('content').innerHTML =
    '<div id="usage">' +
    'Provide a TMDB ID as a query parameter:<br><br>' +
    '<code>?id=550</code> &mdash; movie<br>' +
    '<code>?id=456&amp;s=1&amp;e=1</code> &mdash; TV episode' +
    '</div>';
}

function showError(msg) {
  document.getElementById('card-title').textContent = 'Error';
  document.getElementById('content').innerHTML =
    '<div id="error-msg">&#x2715; ' + escapeHtml(msg) + '</div>';
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function syntaxHighlight(json) {
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function(match) {
    if (/^"/.test(match)) {
      if (/:$/.test(match)) return '<span class="json-key">' + escapeHtml(match) + '</span>';
      return '<span class="json-string">' + escapeHtml(match) + '</span>';
    }
    if (/null/.test(match)) return '<span class="json-null">' + match + '</span>';
    return match;
  });
}

function showJson(data) {
  rawJson = JSON.stringify(data, null, 2);
  var highlighted = syntaxHighlight(rawJson);
  document.getElementById('content').innerHTML = '<pre>' + highlighted + '</pre>';
  document.getElementById('card-title').textContent = 'Stream Info';
  document.getElementById('copy-btn').style.display = 'inline-block';
}

function copyJson() {
  if (!rawJson) return;
  navigator.clipboard.writeText(rawJson).then(function() {
    var btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = 'Copy JSON';
      btn.classList.remove('copied');
    }, 2000);
  });
}

if (!id) {
  showUsage();
} else {
  var api = '/api?' + (s ? 'id='+id+'&s='+s+'&e='+(e||'1') : 'id='+id);
  fetch(api)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.error) return showError(d.error);
      showJson(d);
    })
    .catch(function(err) { showError(err.message); });
}
</script>
</body>
</html>
